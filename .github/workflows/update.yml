name: Update Pages Documentation

on:
  schedule:
    - cron: '0 0 * * *'
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Generate state controllers
        run: python merge_sctrl.py

      - name: Generate triggers
        run: python merge_triggers.py

      - name: Create docs folder
        run: mkdir -p docs

      - name: Copy generated files to docs
        run: |
          cp sctrl_merged.md docs/SCTRL.md
          cp triggers_merged.md docs/Triggers.md

      - name: Create index page (Home)
        run: |
          cat > docs/index.md << 'EOF'
          <style>
          .markdown-body {
            max-width: 1200px !important;
            margin: 0 auto !important;
            padding: 0 40px !important;
          }
          </style>

          # Ikemen GO Merged Documentation

          This page contains automatically generated merged documentation from M.U.G.E.N 1.1 and Ikemen GO.

          ## Pages

          - [State Controllers (SCTRL)](SCTRL)
          - [Triggers](Triggers)

          ---

          *Updated daily via GitHub Actions.*
          EOF

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add docs/
          git diff --staged --quiet || git commit -m "docs: auto-update Pages [skip ci]"
          git push