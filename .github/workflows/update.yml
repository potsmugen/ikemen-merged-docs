name: Update Pages Documentation

on:
  schedule:
    - cron: '0 0 * * *'   # Daily at midnight UTC
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Generate state controllers
        run: python merge_sctrl.py

      - name: Generate triggers
        run: python merge_triggers.py

      - name: Generate redirections
        run: python merge_redirections.py

      - name: Check for content changes (excluding index.md)
        id: check
        run: |
          if git status --porcelain docs/ | grep -v "docs/index.md" | grep -q .; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Update index page with timestamp
        if: steps.check.outputs.changed == 'true'
        run: |
          sed "s/TIMESTAMP_PLACEHOLDER/$(date -u +'%Y-%m-%d %H:%M:%S UTC')/g" static/index_template.md > docs/index.md

      - name: Commit and push changes
        if: steps.check.outputs.changed == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add docs/
          git commit -m "docs: auto-update Pages [skip ci]"
          git push
