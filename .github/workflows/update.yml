name: Update Pages Documentation

on:
  schedule:
    - cron: '0 0 * * *'   # Daily at midnight UTC
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4.2.2  # Updated to latest v4 patch

      - name: Set up Python
        uses: actions/setup-python@v5.3.0  # Updated to latest v5 patch

      - name: Install dependencies
        run: pip install requests

      - name: Generate state controllers
        run: python merge_sctrl.py

      - name: Generate triggers
        run: python merge_triggers.py

      - name: Generate redirections
        run: python merge_redirections.py

      - name: Recreate index page (Home)
        run: |
          cat > docs/index.md << 'EOF'
          # Ikemen GO Merged Documentation

          The documentation in this page is obtained from automatically merging the Ikemen GO wiki with the Mugn 1.1 documentation.

          ## Pages

          - [State Controllers (SCTRL)](sctrl)
          - [Triggers](triggers)
          - [Trigger Redirections](redirections)

          ---

          *Updated daily via GitHub Actions.*
          EOF
          
          # Append the current UTC timestamp to the bottom of the file
          echo "*Last updated: $(date -u +'%Y-%m-%d %H:%M:%S UTC')*" >> docs/index.md

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add docs/
          git diff --staged --quiet || git commit -m "docs: auto-update Pages [skip ci]"
          git push
