name: Update Pages Documentation

on:
  schedule:
    - cron: '0 0 * * *'   # Daily at midnight UTC
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Generate state controllers
        run: python merge_sctrl.py

      - name: Generate triggers
        run: python merge_triggers.py

      - name: Generate redirections
        run: python merge_redirections.py

      - name: Check for content changes (excluding index.md)
        id: check
        run: |
          if git status --porcelain docs/ | grep -v "docs/index.md" | grep -q .; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Recreate index page (Home) with timestamp
        if: steps.check.outputs.changed == 'true'
        run: |
          cat > docs/index.md << 'EOF'
          # Ikemen GO Merged Documentation

          The documentation in this page is obtained by automatically merging the Ikemen GO wiki with the M.U.G.E.N 1.1 documentation.

          ## Pages

          - [State Controllers (SCTRL)](sctrl)
          - [Triggers](triggers)
          - [Redirections](redirections)

          ## About the tags
          - `old`: Features that already existed in M.U.G.E.N and are still supported in Ikemen GO.
          - `changed`: M.U.G.E.N features that were modified or expanded in Ikemen GO.
          - `new`: Ikemen GO features that did not exist in M.U.G.E.N.

          ## Notes
          In the `old` sections, the "deprecated" notices refer to M.U.G.E.N 1.1 standards. Ikemen GO maintains backward compatibility, so these features will always continue to work. However, their deprecation might mean there are better alternatives available.

          ## Sources

          M.U.G.E.N 1.1 documentation:  
          <https://www.elecbyte.com/mugendocs-11b1/mugen.html>  
          Copyright (c) 1999-2013 Elecbyte. All rights reserved.  
            
          Ikemen GO documentation:  
          <https://github.com/ikemen-engine/Ikemen-GO/wiki>  
          Copyright (c) Ikemen GO contributors.  

          ---

          *Updated daily via GitHub Actions.*  
          *Last updated: {{ site.time | date: "%Y-%m-%d %H:%M:%S %Z" }}*
          EOF

          # Append the current UTC timestamp to the bottom of the file
          #echo "*Last updated: $(date -u +'%Y-%m-%d %H:%M:%S UTC')*" >> docs/index.md

      - name: Commit and push changes
        if: steps.check.outputs.changed == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add docs/
          git commit -m "docs: auto-update Pages [skip ci]"
          git push
