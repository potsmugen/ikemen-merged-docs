# GitHub Pages configuration
title: Ikemen GO Merged Documentation
description: Automatically merged documentation for Ikemen GO
theme: jekyll-theme-cayman

# Enable markdown features
markdown: kramdown
kramdown:
  input: GFM
  auto_ids: true
  toc_levels: 1..6

# Optional: Add custom CSS
defaults:
  - scope:
      path: ""
    values:
      layout: default